<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>贪吃蛇游戏</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
margin:0;
padding:0;
width:100%;
min-height:100%;
overflow-x:hidden;
}

body{
background:#0b1f20;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:flex-start;
padding:12px;
touch-action:manipulation;
}

.game-box{
width:min(100%,520px);
background:#102829;
border-radius:18px;
padding:14px;
text-align:center;
box-shadow:0 8px 30px rgba(0,0,0,0.35);
}

h1{
margin:0 0 8px 0;
font-size:32px;
}

p{
margin:0 0 10px 0;
color:#d6efec;
font-size:14px;
line-height:1.4;
}

.topbar{
display:flex;
flex-wrap:wrap;
justify-content:center;
align-items:center;
gap:8px;
margin-bottom:12px;
}

.info{
background:#163537;
padding:8px 12px;
border-radius:10px;
font-size:16px;
}

button{
background:#2bc46d;
color:white;
border:none;
border-radius:10px;
padding:10px 16px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.canvas-wrap{
display:flex;
justify-content:center;
}

canvas{
width:min(92vw,420px);
height:min(92vw,420px);
max-width:420px;
max-height:420px;
border:2px solid #244d4f;
border-radius:12px;
background:#183c3c;
display:block;
touch-action:none;
}

.controls{
margin-top:14px;
display:grid;
grid-template-columns:repeat(3,min(70px,18vw));
grid-template-rows:repeat(2,min(70px,18vw));
justify-content:center;
gap:10px;
}

.ctrl-btn{
background:#1e4f51;
color:white;
border:none;
border-radius:14px;
font-size:28px;
width:min(70px,18vw);
height:min(70px,18vw);
padding:0;
}

.ctrl-btn:active{
transform:scale(0.96);
}

.up{grid-column:2;grid-row:1}
.left{grid-column:1;grid-row:2}
.down{grid-column:2;grid-row:2}
.right{grid-column:3;grid-row:2}

.small{
margin-top:10px;
font-size:13px;
color:#b7d9d8;
}

</style>
</head>

<body>

<div class="game-box">

<h1>贪吃蛇</h1>

<p>
点击开始。电脑用方向键。手机可滑动或点按钮。<br>
游戏结束后按空格或点击开始重新开始。
</p>

<div class="topbar">
<button onclick="startGame()">开始</button>
<div class="info" id="score">分数: 0</div>
<div class="info" id="highScore">最高分: 0</div>
</div>

<div class="canvas-wrap">
<canvas id="game" width="420" height="420"></canvas>
</div>

<div class="controls">
<button class="ctrl-btn up" onclick="setDirection('up')">↑</button>
<button class="ctrl-btn left" onclick="setDirection('left')">←</button>
<button class="ctrl-btn down" onclick="setDirection('down')">↓</button>
<button class="ctrl-btn right" onclick="setDirection('right')">→</button>
</div>

<div class="small">手机和电脑都可以玩</div>

</div>

<script>

window.addEventListener("keydown",function(e){
if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)){
e.preventDefault();
}
},{passive:false});

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const grid=21;
const tile=canvas.width/grid;

let animationId=null;
let highScore=Number(localStorage.getItem("snakeHighScore")||0);

const game={
snake:[],
dx:1,
dy:0,
nextDx:1,
nextDy:0,
food:{x:10,y:10},
score:0,
speed:140,
lastTime:0,
gameOver:false,
running:false
};

const scoreEl=document.getElementById("score");
const highScoreEl=document.getElementById("highScore");

function updateScore(){
scoreEl.textContent="分数: "+game.score;
highScoreEl.textContent="最高分: "+highScore;
}

function saveHighScore(){
localStorage.setItem("snakeHighScore",highScore);
}

function placeFood(){
let valid=false;
while(!valid){
game.food.x=Math.floor(Math.random()*grid);
game.food.y=Math.floor(Math.random()*grid);
valid=!game.snake.some(p=>p.x===game.food.x&&p.y===game.food.y);
}
}

function drawBoard(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let y=0;y<grid;y++){
for(let x=0;x<grid;x++){
ctx.fillStyle=(x+y)%2?"#145a5c":"#0f3d3e";
ctx.fillRect(x*tile,y*tile,tile,tile);
}
}
}

function drawFood(){
ctx.fillStyle="red";
ctx.fillRect(game.food.x*tile,game.food.y*tile,tile,tile);
}

function drawSnake(){
ctx.fillStyle="#31c96b";
for(let s of game.snake){
ctx.fillRect(s.x*tile,s.y*tile,tile,tile);
}
}

function drawGameOver(){

ctx.fillStyle="rgba(0,0,0,0.55)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.textAlign="center";
ctx.font="34px Arial";
ctx.fillText("游戏结束",canvas.width/2,canvas.height/2-20);

ctx.font="20px Arial";
ctx.fillText("最终分数: "+game.score,canvas.width/2,canvas.height/2+10);

ctx.font="18px Arial";
ctx.fillText("最高分: "+highScore,canvas.width/2,canvas.height/2+40);

}

function endGame(){
game.gameOver=true;

if(game.score>highScore){
highScore=game.score;
saveHighScore();
}

updateScore();
}

function moveSnake(){

game.dx=game.nextDx;
game.dy=game.nextDy;

const head={
x:game.snake[0].x+game.dx,
y:game.snake[0].y+game.dy
};

if(head.x<0||head.x>=grid||head.y<0||head.y>=grid){
endGame();
return;
}

if(game.snake.some(p=>p.x===head.x&&p.y===head.y)){
endGame();
return;
}

game.snake.unshift(head);

if(head.x===game.food.x&&head.y===game.food.y){

game.score++;

if(game.score>highScore){
highScore=game.score;
saveHighScore();
}

updateScore();

placeFood();

}else{
game.snake.pop();
}

}

function drawAll(){
drawBoard();
drawFood();
drawSnake();
if(game.gameOver)drawGameOver();
}

function loop(time){

if(!game.running)return;

if(!game.lastTime)game.lastTime=time;

const elapsed=time-game.lastTime;

if(!game.gameOver&&elapsed>=game.speed){
game.lastTime=time;
moveSnake();
}

drawAll();

animationId=requestAnimationFrame(loop);

}

function startGame(){

if(animationId)cancelAnimationFrame(animationId);

game.snake=[
{x:5,y:10},
{x:4,y:10},
{x:3,y:10}
];

game.dx=1;
game.dy=0;
game.nextDx=1;
game.nextDy=0;
game.score=0;
game.speed=140;
game.lastTime=0;
game.gameOver=false;
game.running=true;

placeFood();
updateScore();
drawAll();

animationId=requestAnimationFrame(loop);

}

function setDirection(dir){

if(game.gameOver)return;

if(dir==="up"&&game.dy!==1){
game.nextDx=0;
game.nextDy=-1;
}
else if(dir==="down"&&game.dy!==-1){
game.nextDx=0;
game.nextDy=1;
}
else if(dir==="left"&&game.dx!==1){
game.nextDx=-1;
game.nextDy=0;
}
else if(dir==="right"&&game.dx!==-1){
game.nextDx=1;
game.nextDy=0;
}

}

document.addEventListener("keydown",function(e){

if(e.key===" "){

if(game.gameOver)startGame();
return;

}

if(e.key==="ArrowUp")setDirection("up");
else if(e.key==="ArrowDown")setDirection("down");
else if(e.key==="ArrowLeft")setDirection("left");
else if(e.key==="ArrowRight")setDirection("right");

});

let touchX=0;
let touchY=0;

canvas.addEventListener("touchstart",e=>{
touchX=e.touches[0].clientX;
touchY=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{

let dx=e.changedTouches[0].clientX-touchX;
let dy=e.changedTouches[0].clientY-touchY;

if(Math.abs(dx)>Math.abs(dy)){
if(dx>0)setDirection("right");
else setDirection("left");
}else{
if(dy>0)setDirection("down");
else setDirection("up");
}

});

updateScore();
drawAll();

</script>

</body>
</html>
